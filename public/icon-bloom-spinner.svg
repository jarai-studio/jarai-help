<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Loading">
  <style>
    .jarai-iris { transform-origin: center; transform-box: fill-box; animation: jarai-spin 3.2s linear infinite; }
    .jarai-spark { transform-origin: center; transform-box: fill-box; animation: jarai-pulse 1.4s ease-in-out infinite; }
    @keyframes jarai-spin { to { transform: rotate(360deg); } }
    @keyframes jarai-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.78); } }
    @media (prefers-reduced-motion: reduce) { .jarai-iris,.jarai-spark { animation: none; } }
  </style>
  <circle cx="50" cy="50" r="41" fill="none" stroke="#0F766E" stroke-width="2.6" opacity="0.4"></circle>
  <g class="jarai-iris" fill="none" stroke="#0F766E" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 31 L66.45 40.5 L66.45 59.5 L50 69 L33.55 59.5 L33.55 40.5 Z"></path>
    <line x1="50" y1="31" x2="74.4" y2="20.9"></line>
    <line x1="66.45" y1="40.5" x2="87.4" y2="56.6"></line>
    <line x1="66.45" y1="59.5" x2="63" y2="85.7"></line>
    <line x1="50" y1="69" x2="25.6" y2="79.1"></line>
    <line x1="33.55" y1="59.5" x2="12.6" y2="43.4"></line>
    <line x1="33.55" y1="40.5" x2="37" y2="14.3"></line>
  </g>
  <circle class="jarai-spark" cx="50" cy="50" r="5.5" fill="#E0823F"></circle>
</svg>