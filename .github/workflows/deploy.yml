name: Deploy help.jarai.studio

# Triggers:
# - push to main: builds + deploys to PRD SWA (https://help.jarai.studio)
# - pull_request: builds + deploys a preview environment (closed when PR merges/closes)
# - workflow_dispatch: manual rebuild
#
# Runner policy (2026-06-04, rev 2): build_and_deploy runs on the org self-hosted runner
# pool ([self-hosted, Linux, X64]). The operator granted the org self-hosted runner group
# repository access to jarai-help on 2026-06-04 — the missing grant was why the 2026-06-01
# self-hosted move queued forever + got cancelled (fixed temporarily by reverting to hosted
# in PR #2). With access granted, build_and_deploy is back on self-hosted to avoid hosted
# minute costs, uploading pre-built dist/ via @azure/static-web-apps-cli (no Docker needed).
# close_pull_request stays on GitHub-hosted: the SWA `action: close` mode needs the
# Docker-based action, which the self-hosted runner has no Docker for. Tiny, rare job.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: [self-hosted, Linux, X64]
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (astro check + astro build)
        run: |
          npm run check
          npm run build

      - name: Deploy to Azure Static Web Apps (SWA CLI — no Docker on self-hosted runner)
        run: npx --yes @azure/static-web-apps-cli@2 deploy ./dist --deployment-token "$SWA_DEPLOYMENT_TOKEN" --env production
        env:
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull-request preview
    steps:
      - name: Close PR preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
