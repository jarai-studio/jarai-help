name: Deploy help.jarai.studio

# Triggers:
# - push to main: builds + deploys to PRD SWA (https://help.jarai.studio)
# - pull_request: builds + deploys a preview environment (closed when PR merges/closes)
# - workflow_dispatch: manual rebuild
#
# Runner policy (2026-06-04): build_and_deploy runs on GitHub-hosted ubuntu-latest.
# help.jarai.studio is a PRODUCTION SWA, and per the org runner policy (JAR_Deploy.md)
# PRD deploy jobs deliberately stay on ubuntu-latest so a release never depends on the
# self-hosted runner being online. The 2026-06-01 move to [self-hosted, Linux, X64] broke
# this: jarai-help isn't granted access in the org self-hosted runner group, so every main
# deploy queued for a runner that never picked it up and was cancelled. Reverted to hosted.
# The @azure/static-web-apps-cli deploy step runs fine on ubuntu-latest (Docker not needed
# for the CLI; ubuntu-latest has it anyway). close_pull_request was already ubuntu-latest.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (astro check + astro build)
        run: |
          npm run check
          npm run build

      - name: Deploy to Azure Static Web Apps (SWA CLI — no Docker on self-hosted runner)
        run: npx --yes @azure/static-web-apps-cli@2 deploy ./dist --deployment-token "$SWA_DEPLOYMENT_TOKEN" --env production
        env:
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull-request preview
    steps:
      - name: Close PR preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
