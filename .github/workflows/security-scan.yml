# .github/workflows/security-scan.yml
#
# Continuous security scanning for this static-site repo:
#   1. secret-scan  — gitleaks over the PR's own commits (BLOCKING) so a newly
#      committed secret (API key, token, SAS) fails the PR. A weekly full-history
#      sweep runs as ADVISORY (never blocks) to surface anything pre-existing.
#   2. npm-audit    — advisory dependency audit (weekly + PR), posted to the summary.
#
# Runs on GitHub-hosted ubuntu-latest: the jobs are tiny/infrequent (seconds), and a
# hosted runner is more reliable for a PR-blocking gate than the org's WSL self-hosted
# runners. gitleaks is a pinned static binary (no gitleaks-action org licence needed).
name: Security Scan

on:
  pull_request:
  schedule:
    - cron: '23 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.18.4"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned binary)
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: |
          set -euo pipefail
          CFG=""; [ -f .gitleaks.toml ] && CFG="--config .gitleaks.toml"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --quiet origin "${{ github.base_ref }}"
            echo "Scanning PR commit range origin/${{ github.base_ref }}..HEAD (blocking)"
            gitleaks detect --source . $CFG --redact \
              --log-opts="origin/${{ github.base_ref }}..HEAD" -v
          else
            echo "Full-history sweep (advisory)"
            gitleaks detect --source . $CFG --redact -v || \
              echo "::warning::gitleaks flagged pre-existing findings — review (advisory, non-blocking)."
          fi

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm audit (advisory)
        run: |
          {
            echo "## npm audit"
            echo '```'
            npm audit --audit-level=high 2>&1 | tail -n 40 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
